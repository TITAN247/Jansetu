# Render.com Single-Service Deployment for JanSetu AI
# Frontend + Backend served from one service
services:
  - type: web
    name: jansetu-ai
    env: python
    plan: free
    buildCommand: |
      # Install Node.js for frontend build
      curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
      apt-get install -y nodejs
      # Build frontend
      cd frontend && npm install && npm run build
      # Install Python dependencies
      cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: NODE_VERSION
        value: 18.17.0
      - key: FLASK_ENV
        value: production
      - key: MONGO_URI
        sync: false  # Set this in Render dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: EMAIL_SENDER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
